name: Release to PyPI

on:
  push:
    tags:
      - "v*"

# Trusted Publishing (PyPI OIDC) — no secret required. Configure a pending
# publisher on PyPI side pointing at this repo + workflow + environment.
# https://docs.pypi.org/trusted-publishers/

permissions:
  contents: read

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(python -c 'import tomllib,pathlib; import re; \
              txt=pathlib.Path("meeting_hive/__init__.py").read_text(); \
              m=re.search(r"__version__\s*=\s*\"([^\"]+)\"", txt); print(m.group(1))')
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package version $PKG_VERSION"
            exit 1
          fi
          echo "Tag matches package version: $PKG_VERSION"
      - name: Install build
        run: python -m pip install --upgrade pip build
      - name: Build
        run: python -m build
      - name: Inspect artifacts
        run: ls -lh dist/
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/meeting-hive
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: distributions
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes "See [CHANGELOG.md](https://github.com/plribeiro3000/meeting-hive/blob/main/CHANGELOG.md) for details."
